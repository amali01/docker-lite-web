# pnpm 10+ moved settings here from the package.json "pnpm" field.
# Delay installs until releases have had a week to be vetted, so malware
# published and pulled within hours never reaches an install here.
minimumReleaseAge: 10080
# Refuse packages whose trust signals (provenance, signatures) weaken
# between resolutions.
trustPolicy: no-downgrade
# One reviewed exception: undici-types@6.21.0 (pinned via the transitive
# @types/node@22 that @types/superagent drags in) was published 2024-11-13 by
# the undici/Node.js core maintainers, before that package adopted npm
# provenance — flagged only because the policy re-checks old lockfile entries
# retroactively. Exact version; delete once nothing resolves @types/node@22.
trustPolicyExclude:
  - 'undici-types@6.21.0'
# Allow postinstall build scripts for the native deps this app relies on:
# argon2 (password hashing), ssh2 + cpu-features (SSH engine connections),
# @swc/core + esbuild (build tooling), protobufjs (transitive native build).
allowBuilds:
  '@swc/core': true
  argon2: true
  cpu-features: true
  esbuild: true
  protobufjs: true
  ssh2: true
# Make the release-age gate strict: a package younger than the age window is
# rejected unless it is listed below, instead of pnpm silently auto-admitting
# it. Keeps the exclusions an explicit, reviewed allowlist.
minimumReleaseAgeStrict: true
# Admit a few just-published packages past pnpm's default 24h release-age gate.
# These are exact-version, upgrade targets adopted the day they shipped; the
# whole block is transient - delete it once these versions clear the age window.
minimumReleaseAgeExclude:
  - '@types/supertest@7.2.1'
  - 'oxlint@1.74.0'
  - '@oxlint/binding-android-arm-eabi@1.74.0'
  - '@oxlint/binding-android-arm64@1.74.0'
  - '@oxlint/binding-darwin-arm64@1.74.0'
  - '@oxlint/binding-darwin-x64@1.74.0'
  - '@oxlint/binding-freebsd-x64@1.74.0'
  - '@oxlint/binding-linux-arm-gnueabihf@1.74.0'
  - '@oxlint/binding-linux-arm-musleabihf@1.74.0'
  - '@oxlint/binding-linux-arm64-gnu@1.74.0'
  - '@oxlint/binding-linux-arm64-musl@1.74.0'
  - '@oxlint/binding-linux-ppc64-gnu@1.74.0'
  - '@oxlint/binding-linux-riscv64-gnu@1.74.0'
  - '@oxlint/binding-linux-riscv64-musl@1.74.0'
  - '@oxlint/binding-linux-s390x-gnu@1.74.0'
  - '@oxlint/binding-linux-x64-gnu@1.74.0'
  - '@oxlint/binding-linux-x64-musl@1.74.0'
  - '@oxlint/binding-openharmony-arm64@1.74.0'
  - '@oxlint/binding-win32-arm64-msvc@1.74.0'
  - '@oxlint/binding-win32-ia32-msvc@1.74.0'
  - '@oxlint/binding-win32-x64-msvc@1.74.0'
  # Published 2026-07-11..13, inside the 7-day window when the window was
  # first enabled. Each crosses the window by 2026-07-20 — delete these
  # entries then (they stay exempt as long as they are listed).
  - '@floating-ui/core@1.8.0'
  - '@floating-ui/dom@1.8.0'
  - '@floating-ui/react-dom@2.1.9'
  - '@floating-ui/utils@0.2.12'
  - 'es-module-lexer@2.3.1'
  - 'nanoid@3.3.16'
  - 'postcss@8.5.19'
  - 'tsx@4.23.1'
