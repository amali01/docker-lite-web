services:
  backend:
    image: node:24-alpine
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm server:dev"
    environment:
      DOCKLITE_DOCKER_SOCKET: /var/run/docker.sock
      DOCKLITE_HOST: 0.0.0.0
      DOCKLITE_PORT: 9001
    ports:
      - "${DOCKLITE_BACKEND_PORT:-9001}:9001"
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm dev --host 0.0.0.0 --port 8080"
    ports:
      - "${DOCKLITE_FRONTEND_PORT:-8080}:8080"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules: